# ─── Dependency Review ───────────────────────────────────────────────────────
# Scans PRs for newly added dependencies with known vulnerabilities.
# Catches supply chain risks before they reach production.

name: Dependency Review

on:
  pull_request:
    branches: [main]
    paths:
      - "requirements.txt"
      - "Dockerfile"

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: "Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc --fix --dry-run
