# ─── PR Validation Pipeline (GitHub Actions) ────────────────────────────────
# Runs on every pull request to validate code quality, infrastructure changes,
# and security before merging.
#
# Design: GitHub Actions handles PR validation; Buildkite handles deploys.
# This split lets product engineers get fast PR feedback without needing
# access to Buildkite or deploy infrastructure.

name: PR Validation

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"

# Cancel in-progress runs for the same PR (saves CI minutes)
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ── Python Tests & Lint ──────────────────────────────────────────────────
  test:
    name: "Tests & Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: |
          cd cmd/product-catalog
          python -m pytest tests/ -v --tb=short --junitxml=../../test-results/unit.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

  # ── Helm Chart Validation ────────────────────────────────────────────────
  helm-lint:
    name: "Helm Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "v3.16.4"

      - name: Lint with all value combinations
        run: |
          echo "--- Default values"
          helm lint ./helm-chart

          echo "--- Staging values"
          helm lint ./helm-chart -f helm-chart/values-staging.yaml

          echo "--- Production US"
          helm lint ./helm-chart -f helm-chart/values-production.yaml -f helm-chart/values-us.yaml

          echo "--- Production AU"
          helm lint ./helm-chart -f helm-chart/values-production.yaml -f helm-chart/values-au.yaml

      - name: Template render test
        run: |
          helm template product-catalog ./helm-chart \
            -f helm-chart/values-production.yaml \
            -f helm-chart/values-us.yaml \
            > /dev/null

          helm template product-catalog ./helm-chart \
            -f helm-chart/values-production.yaml \
            -f helm-chart/values-au.yaml \
            > /dev/null

          echo "All template renders succeeded"

  # ── Terraform Validation ─────────────────────────────────────────────────
  terraform-validate:
    name: "Terraform Validate"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [staging, production]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/

  # ── Security Scanning ────────────────────────────────────────────────────
  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # For uploading SARIF results
    steps:
      - uses: actions/checkout@v4

      # Scan Docker image for vulnerabilities
      - name: Trivy - Dockerfile scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "sarif"
          output: "trivy-config.sarif"
          severity: "HIGH,CRITICAL"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-config.sarif"

      # Scan Terraform for misconfigurations
      - name: Checkov - IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: true  # Don't block PR, but make findings visible
          quiet: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "checkov.sarif"

  # ── Dockerfile Build Test ────────────────────────────────────────────────
  docker-build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: product-catalog:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── PR Summary ───────────────────────────────────────────────────────────
  # Posts a summary comment on the PR with all check results
  pr-summary:
    name: "PR Summary"
    runs-on: ubuntu-latest
    needs: [test, helm-lint, terraform-validate, security-scan, docker-build]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Post PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = ${{ toJSON(needs) }};
            const results = Object.entries(jobs).map(([name, job]) => {
              const icon = job.result === 'success' ? '✅' : job.result === 'failure' ? '❌' : '⚠️';
              return `| ${icon} | ${name} | ${job.result} |`;
            });

            const allPassed = Object.values(jobs).every(j => j.result === 'success');
            const header = allPassed
              ? '### ✅ All PR checks passed'
              : '### ⚠️ Some PR checks need attention';

            const body = [
              header,
              '',
              '| Status | Check | Result |',
              '|--------|-------|--------|',
              ...results,
              '',
              allPassed
                ? '> Ready for review and merge. Buildkite will handle deployment after merge.'
                : '> Please fix failing checks before requesting review.',
            ].join('\n');

            // Find existing comment to update (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('PR checks')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
