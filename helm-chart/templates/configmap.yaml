apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "product-catalog.fullname" . }}
  labels:
    {{- include "product-catalog.labels" . | nindent 4 }}
data:
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  REGION: {{ .Values.config.region | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  SERVICE_VERSION: {{ .Values.image.tag | default .Chart.AppVersion | quote }}
  PORT: {{ .Values.service.targetPort | quote }}
  # Circuit breaker tuning — these may differ per region based on
  # network latency between services (AU has higher baseline latency)
  CB_FAILURE_THRESHOLD: {{ .Values.config.circuitBreaker.failureThreshold | quote }}
  CB_RECOVERY_TIMEOUT: {{ .Values.config.circuitBreaker.recoveryTimeoutSeconds | quote }}
  CB_HALF_OPEN_MAX_CALLS: {{ .Values.config.circuitBreaker.halfOpenMaxCalls | quote }}
