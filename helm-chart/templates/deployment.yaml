apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "product-catalog.fullname" . }}
  labels:
    {{- include "product-catalog.labels" . | nindent 4 }}
    {{- include "product-catalog.datadogLabels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "product-catalog.selectorLabels" . | nindent 6 }}
  # Rolling update strategy — ensures zero-downtime deploys.
  # maxSurge=1 creates one extra pod before terminating old ones.
  # maxUnavailable=0 means we never drop below desired replica count.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "product-catalog.selectorLabels" . | nindent 8 }}
        {{- include "product-catalog.datadogLabels" . | nindent 8 }}
      annotations:
        # Force rolling restart when configmap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        # Datadog autodiscovery: scrape Prometheus metrics
        ad.datadoghq.com/{{ include "product-catalog.name" . }}.checks: |
          {
            "openmetrics": {
              "instances": [{
                "openmetrics_endpoint": "http://%%host%%:{{ .Values.service.targetPort }}/metrics",
                "namespace": "product_catalog",
                "metrics": [
                  "http_requests_total",
                  "http_request_duration_seconds",
                  "app_errors_total",
                  "http_active_requests",
                  "service_uptime_seconds"
                ]
              }]
            }
          }
        # Datadog log collection
        ad.datadoghq.com/{{ include "product-catalog.name" . }}.logs: |
          [{
            "source": "python",
            "service": "{{ include "product-catalog.name" . }}",
            "log_processing_rules": [{
              "type": "multi_line",
              "name": "log_start_with_json",
              "pattern": "\\{"
            }]
          }]
    spec:
      serviceAccountName: {{ include "product-catalog.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}

      {{- /* ── Pod Anti-Affinity ──────────────────────────────────────── */}}
      {{- if .Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          {{- if eq .Values.podAntiAffinity.type "required" }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - {{ include "product-catalog.name" . }}
              topologyKey: kubernetes.io/hostname
          {{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - {{ include "product-catalog.name" . }}
                topologyKey: kubernetes.io/hostname
            # Also spread across availability zones for regional resilience
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - {{ include "product-catalog.name" . }}
                topologyKey: topology.kubernetes.io/zone
          {{- end }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: {{ include "product-catalog.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          envFrom:
            - configMapRef:
                name: {{ include "product-catalog.fullname" . }}

          securityContext:
            allowPrivilegeEscalation: {{ .Values.containerSecurityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.containerSecurityContext.readOnlyRootFilesystem }}
            capabilities:
              drop:
                {{- toYaml .Values.containerSecurityContext.capabilities.drop | nindent 16 }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          {{- /* ── Health Probes ─────────────────────────────────────── */}}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}

          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}

          {{- /* ── Graceful Shutdown ────────────────────────────────── */}}
          # PreStop hook: sleep before SIGTERM so the load balancer
          # deregisters this pod first, preventing in-flight request drops.
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep {{ .Values.preStopHookSleepSeconds }}"

          # Writable tmp dir for read-only root filesystem
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
